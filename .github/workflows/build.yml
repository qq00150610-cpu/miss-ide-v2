name: Build Miss IDE v2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.3'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: *//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"
      
      - name: Determine Build Type
        id: build_type
        run: |
          if [ "${{ inputs.build_type }}" != "" ]; then
            echo "type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=release" >> $GITHUB_OUTPUT
          fi
      
      - name: Build APK
        run: |
          if [ "${{ steps.build_type.outputs.type }}" == "debug" ]; then
            flutter build apk --debug --no-tree-shake-icons || flutter build apk --debug
          else
            flutter build apk --release --no-tree-shake-icons || flutter build apk --release
          fi
      
      - name: List Build Outputs
        run: ls -la build/app/outputs/flutter-apk/
      
      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk/
          cp app-${{ steps.build_type.outputs.type }}.apk miss-ide-v2.apk
          ls -la *.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: miss-ide-v2-apk
          path: build/app/outputs/flutter-apk/miss-ide-v2.apk
          retention-days: 30
      
      - name: Display Download Info
        run: |
          echo "=========================================="
          echo "构建完成！"
          echo "版本: ${{ steps.version.outputs.version }}"
          echo "APK 文件: miss-ide-v2.apk"
          echo "下载: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="
