name: Build Miss IDE v2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.3'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons 2>&1 || flutter build apk --release 2>&1
      
      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk/
          cp app-release.apk miss-ide-v2-release.apk
          ls -la *.apk
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: miss-ide-v2-release
          path: build/app/outputs/flutter-apk/miss-ide-v2-release.apk
          retention-days: 30
      
      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-build-${{ github.run_number }}
          name: Miss IDE v2 Build #${{ github.run_number }}
          body: |
            Miss IDE v2 最新构建版本
            
            下载 APK 文件安装即可使用
          files: build/app/outputs/flutter-apk/miss-ide-v2-release.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
