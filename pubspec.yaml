name: miss_ide
description: "Miss IDE v2 - 移动端智能集成开发环境"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  
  # 状态管理 - Riverpod
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 网络
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  
  # 存储
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 文件系统
  file_picker: ^6.1.1
  path: ^1.8.3
  
  # 终端模拟
  xterm: ^4.0.0
  
  # 编辑器
  re_editor: ^0.6.0
  re_highlight: ^0.0.4
  
  # 代码编辑
  code_text_field: ^1.1.0
  
  # 工具
  uuid: ^4.2.2
  collection: ^1.18.0
  intl: ^0.18.1
  crypto: ^3.0.3
  
  # 权限
  permission_handler: ^11.1.0
  
  # 图片处理
  image_picker: ^1.0.5
  
  # 进度显示
  percent_indicator: ^4.2.3
  
  # 剪切板
  flutter_clipboard_manager: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
    - assets/templates/
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
